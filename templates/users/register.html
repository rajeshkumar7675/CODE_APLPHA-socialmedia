{% extends "base.html" %}

{% block content %}
<div class="glass-panel auth-card" style="max-width: 500px;">
    <h2>Create Account</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                    <span class="help-text">{{ field.help_text }}</span>
                {% endif %}
                {{ field.errors }}
            </div>
        {% endfor %}
        <button type="submit" class="btn-full">Register</button>
    </form>
    <p style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
        Already have an account? <a href="{% url 'login' %}" style="color: var(--accent-color);">Login here</a>
    </p>
</div>
{% endblock %}

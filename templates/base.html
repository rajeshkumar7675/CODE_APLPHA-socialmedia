<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialSphere</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="glass-bg"></div>
    <nav class="navbar glass-panel">
        <div class="nav-container">
            <a href="{% url 'feed' %}" class="logo">Social<span class="highlight">Sphere</span></a>
            <div class="nav-links">
                {% if user.is_authenticated %}
                    <a href="{% url 'feed' %}" class="nav-btn"><i class="fa-solid fa-house"></i> Feed</a>
                    <a href="{% url 'profile' user.username %}" class="nav-btn"><i class="fa-solid fa-user"></i> Profile</a>
                    <form method="post" action="{% url 'logout' %}" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="nav-btn logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="nav-btn"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
                    <a href="{% url 'register' %}" class="nav-btn primary-btn"><i class="fa-solid fa-user-plus"></i> Register</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="container">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>

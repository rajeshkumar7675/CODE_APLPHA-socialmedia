<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SocialApp{% endtitle %} - Connect with friends</title>
    <meta name="description" content="A rich and dynamic social platform for connecting, posting, and sharing ideas.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'feed' %}" class="nav-brand">🌐 SocialApp</a>
            <div class="nav-links">
                {% if user.is_authenticated %}
                    <a href="{% url 'feed' %}" class="nav-link">Feed</a>
                    <a href="{% url 'profile' user.id %}" class="nav-link">Profile ({{ user.username }})</a>
                    <a href="{% url 'logout' %}" class="nav-link nav-link-danger">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="nav-link">Login</a>
                    <a href="{% url 'register' %}" class="btn-primary">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
